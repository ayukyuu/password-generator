<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>Password Generator</title>
    </head>
    <body>
        <header>
            <h1 id="heading">Generate a <br />random password</h1>
            <p id="subheading">Never use an insecure password again.</p>

        <main>
            <div id="button-container">
                <button id="generator-button">Generate passwords</button>
            </div>
            <hr />
            <div id="password-container">
                <p class="password" id="first-password">firstpassword</p>
                <p class="password" id="second-password">secondpassword</p>
            </div>
        </main>
        <footer>
            <p>&copy; ayukyuu 2026.</p>
        </footer>
    </body>
